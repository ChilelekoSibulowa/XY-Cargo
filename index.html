  <!-- PWA Settings (Dynamically Injected for Mobile Only) -->
  <script id="pwa-config-loader">
    (function() {
      const checkIsDesktop = () => {
        const isLargeScreen = window.innerWidth >= 1024;
        const isNotTouch = !('ontouchstart' in window) && navigator.maxTouchPoints === 0;
        // Also check if it's likely a desktop OS
        const isDesktopOS = !/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        return isLargeScreen || (isNotTouch && isDesktopOS);
      };

      const isDesktop = checkIsDesktop();

      if (!isDesktop) {
        // Inject Manifest
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = '/manifest.webmanifest';
        document.head.appendChild(link);

        // Inject Mobile Meta Tags
        const metaTags = [
          { name: 'theme-color', content: '#ED1C24' },
          { name: 'mobile-web-app-capable', content: 'yes' },
          { name: 'apple-mobile-web-app-capable', content: 'yes' },
          { name: 'apple-mobile-web-app-status-bar-style', content: 'black-translucent' },
          { name: 'apple-mobile-web-app-title', content: 'XY Cargo' }
        ];

        metaTags.forEach(tag => {
          const m = document.createElement('meta');
          m.name = tag.name;
          m.content = tag.content;
          document.head.appendChild(m);
        });

        // Apple Touch Icon
        const appleIcon = document.createElement('link');
        appleIcon.rel = 'apple-touch-icon';
        appleIcon.sizes = '180x180';
        appleIcon.href = '/icons/apple-touch-icon.png';
        document.head.appendChild(appleIcon);
      }
    })();
  </script>

  <script>
    // Logic to detect desktop/laptop browsers
    const checkIsDesktop = () => {
      const isLargeScreen = window.innerWidth >= 1024;
      const isNotTouch = !('ontouchstart' in window) && navigator.maxTouchPoints === 0;
      const isDesktopOS = !/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      return isLargeScreen || (isNotTouch && isDesktopOS);
    };

    const isDesktop = checkIsDesktop();

    // Prevent the "Install App" prompt on desktops/laptops
    window.addEventListener('beforeinstallprompt', (e) => {
      if (isDesktop) {
        e.preventDefault();
        console.log("Installation prompt prevented on desktop.");
      }
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        // Only register service worker on mobile devices
        if (!isDesktop) {
          navigator.serviceWorker
            .register("/sw.js", { scope: "/" })
            .then((registration) => {
              console.log("Service worker registered:", registration.scope);
            })
            .catch((error) => {
              console.warn("Service worker registration failed:", error);
            });
        } else {
          // Unregister any existing service workers if running on desktop
          navigator.serviceWorker.getRegistrations().then((registrations) => {
            for (let registration of registrations) {
              registration.unregister();
              console.log("Service worker unregistered on desktop.");
            }
          });
        }
      });
    }
  </script>
